# EC2 + ALB stack for London (eu-west-2) - single instance, free-tier friendly
# Deploy with: aws cloudformation deploy --template-file ec2-webserver.yaml --stack-name webserver-ec2 --region eu-west-2 --parameter-overrides ...

AWSTemplateFormatVersion: '2010-09-09'
Description: Single EC2 instance with CloudFront CDN running containerized Django app (London eu-west-2)

Parameters:
  ContainerImageUri:
    Type: String
    Description: Full Docker image URI (e.g. 123456789012.dkr.ecr.eu-west-2.amazonaws.com/webserver:latest)
    NoEcho: false

  ContainerPort:
    Type: Number
    Default: 8000
    Description: Port the app listens on inside the container

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into (e.g. default VPC in eu-west-2)

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet for the EC2 instance (must have internet for ECR pull)

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: SSH key pair name for EC2 (e.g. london-ec2). Use the matching .pem to log in.
    Default: london-ec2

Resources:
  # Static Elastic IP for EC2
  AppElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: webserver-eip

  # Security group for EC2 - allow app port + SSH
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 webserver
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          CidrIp: 0.0.0.0/0
          Description: Django app port
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH for admin login
      Tags:
        - Key: Name
          Value: webserver-ec2-sg

  # IAM role for EC2 - pull images from ECR
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ECRReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/*'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role
      InstanceProfileName: !Sub 'webserver-ec2-profile-${AWS::StackName}'

  # EC2 instance - t3.micro (free tier eligible in eu-west-2)
  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref EC2SecurityGroup
          SubnetId: !Ref SubnetId
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              set -e
              yum update -y
              yum install -y docker
              systemctl enable docker
              systemctl start docker
              aws ecr get-login-password --region ${AWS::Region} | docker login --username AWS --password-stdin ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com
              docker pull ${ImageUri}
              docker run -d --name app -p ${Port}:${Port} -e DJANGO_SETTINGS_MODULE=webserver_project.settings --restart unless-stopped ${ImageUri}
            - ImageUri: !Ref ContainerImageUri
              Port: !Ref ContainerPort
      Tags:
        - Key: Name
          Value: webserver-ec2

  # Associate Elastic IP to EC2 instance
  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref WebServerInstance
      AllocationId: !GetAtt AppElasticIP.AllocationId

  # CloudFront Distribution pointing to EC2 public DNS
  AppCloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        Origins:
          - Id: EC2Origin
            DomainName: !Sub '${AppElasticIP}'
            CustomOriginConfig:
              HTTPPort: !Ref ContainerPort
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: all
            Headers:
              - '*'
          TargetOriginId: EC2Origin
          ViewerProtocolPolicy: allow-all
        PriceClass: PriceClass_100

Outputs:
  ElasticIP:
    Description: Static IP address (backup access)
    Value: !Ref AppElasticIP
    Export:
      Name: !Sub '${AWS::StackName}-ElasticIP'

  DirectAppURL:
    Description: Direct access via Elastic IP
    Value: !Sub 'http://${AppElasticIP}:${ContainerPort}'

  CloudFrontDomain:
    Description: CloudFront static domain (never changes)
    Value: !GetAtt AppCloudFront.DomainName
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontDomain'

  CloudFrontURL:
    Description: Access via CloudFront (add as CNAME in Cloudflare)
    Value: !Sub 'http://${AppCloudFront.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontURL'

  EC2InstanceId:
    Description: EC2 instance ID
    Value: !Ref WebServerInstance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
