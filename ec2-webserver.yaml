# EC2 + ALB stack for London (eu-west-2) - single instance, free-tier friendly
# Deploy with: aws cloudformation deploy --template-file ec2-webserver.yaml --stack-name webserver-ec2 --region eu-west-2 --parameter-overrides ...

AWSTemplateFormatVersion: '2010-09-09'
Description: Single EC2 instance behind ALB running containerized Django app (London eu-west-2)

Parameters:
  ContainerImageUri:
    Type: String
    Description: Full Docker image URI (e.g. 123456789012.dkr.ecr.eu-west-2.amazonaws.com/webserver:latest)
    NoEcho: false

  ContainerPort:
    Type: Number
    Default: 8000
    Description: Port the app listens on inside the container

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into (e.g. default VPC in eu-west-2)

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet for the EC2 instance (must have internet for ECR pull)

  ALBSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First subnet for ALB (use 2 different AZs for ALB subnets)

  ALBSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second subnet for ALB (different AZ from ALBSubnet1)

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: SSH key pair name for EC2 (e.g. london-ec2). Use the matching .pem to log in.
    Default: london-ec2

  DomainName:
    Type: String
    Description: Domain name for the application (e.g., app.example.com). Leave empty skip DNS setup.
    Default: ""

  HostedZoneId:
    Type: String
    Description: Route 53 Hosted Zone ID for your domain. Leave empty to skip DNS setup.
    Default: ""

Conditions:
  HasDomain: !Not [!Equals [!Ref DomainName, ""]]

Resources:
  # Static Elastic IP for EC2
  AppElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: webserver-eip

  # DNS Record pointing to Elastic IP
  AppDNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      TTL: 300
      ResourceRecords:
        - !Ref AppElasticIP

  # Security group for EC2 - allow app port from ALB + SSH for login
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 webserver
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH for admin login
      Tags:
        - Key: Name
          Value: webserver-ec2-sg

  # Security group for ALB - allow 80/443 from internet
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Application Load Balancer
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: webserver-ec2-alb-sg

  # IAM role for EC2 - pull images from ECR
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ECRReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/*'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role
      InstanceProfileName: !Sub 'webserver-ec2-profile-${AWS::StackName}'

  # EC2 instance - t3.micro (free tier eligible in eu-west-2)
  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref EC2SecurityGroup
          SubnetId: !Ref SubnetId
      # Associate the Elastic IP
      EipAllocationId: !GetAtt AppElasticIP.AllocationId
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              set -e
              yum update -y
              yum install -y docker
              systemctl enable docker
              systemctl start docker
              aws ecr get-login-password --region ${AWS::Region} | docker login --username AWS --password-stdin ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com
              docker pull ${ImageUri}
              docker run -d --name app -p ${Port}:${Port} -e DJANGO_SETTINGS_MODULE=webserver_project.settings --restart unless-stopped ${ImageUri}
            - ImageUri: !Ref ContainerImageUri
              Port: !Ref ContainerPort
      Tags:
        - Key: Name
          Value: webserver-ec2

  # Application Load Balancer
  WebServerALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'alb-${AWS::StackName}'
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !Ref ALBSubnet1
        - !Ref ALBSubnet2
      Tags:
        - Key: Name
          Value: webserver-ec2-alb

  # Target group (instance type, port 8000)  
  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'tg-${AWS::StackName}'
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: instance
      VpcId: !Ref VpcId
      Targets:
        - Id: !Ref WebServerInstance
          Port: !Ref ContainerPort
      HealthCheckEnabled: true
      HealthCheckPath: /health/
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-tg'

  # ALB listener - port 80 -> target group
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup
      LoadBalancerArn: !Ref WebServerALB
      Port: 80
      Protocol: HTTP

Outputs:
  ElasticIP:
    Description: Static IP address for EC2 instance (free tier friendly)
    Value: !Ref AppElasticIP
    Export:
      Name: !Sub '${AWS::StackName}-ElasticIP'

  DirectAppURL:
    Description: Direct access via Elastic IP (no ALB)
    Value: !Sub 'http://${AppElasticIP}:${ContainerPort}'

  AppDomain:
    Condition: HasDomain
    Description: Access app via custom domain
    Value: !Sub 'http://${DomainName}:${ContainerPort}'

  LoadBalancerDNS:
    Description: ALB DNS name - use this URL to access your app
    Value: !GetAtt WebServerALB.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-ALBDNS'

  LoadBalancerURL:
    Description: Full URL to access the app via ALB (HTTP)
    Value: !Sub 'http://${WebServerALB.DNSName}'
    Export:
      Name: !Sub '${AWS::StackName}-ALBURL'

  EC2InstanceId:
    Description: EC2 instance ID
    Value: !Ref WebServerInstance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
