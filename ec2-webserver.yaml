# EC2 + ALB stack for London (eu-west-2) - single instance, free-tier friendly
# Deploy with: aws cloudformation deploy --template-file ec2-webserver.yaml --stack-name webserver-ec2 --region eu-west-2 --parameter-overrides ...

AWSTemplateFormatVersion: '2010-09-09'
Description: Single EC2 instance with Elastic IP running containerized Django app (London eu-west-2)

Parameters:
  ContainerImageUri:
    Type: String
    Description: Full Docker image URI (e.g. 123456789012.dkr.ecr.eu-west-2.amazonaws.com/webserver:latest)
    NoEcho: false

  ContainerPort:
    Type: Number
    Default: 8000
    Description: Port the app listens on inside the container

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into (e.g. default VPC in eu-west-2)

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet for the EC2 instance (must have internet for ECR pull)

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: SSH key pair name for EC2 (e.g. london-ec2). Use the matching .pem to log in.
    Default: london-ec2

Resources:
  # Auto-generate secure admin password
  AdminPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Django admin superuser password
      GenerateSecretString:
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  # Auto-generate secure database password
  DBPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: RDS database password
      GenerateSecretString:
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  # Static Elastic IP for EC2
  AppElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: webserver-eip

  # Security group for EC2 - allow app port + SSH
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 webserver
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          CidrIp: 0.0.0.0/0
          Description: Django app port
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH for admin login
      Tags:
        - Key: Name
          Value: webserver-ec2-sg

  # Security group for RDS PostgreSQL
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS PostgreSQL
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: EC2 to database
      Tags:
        - Key: Name
          Value: webserver-db-sg

  # IAM role for EC2 - pull images from ECR + read secrets
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ECRReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/*'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !GetAtt AdminPasswordSecret.Arn
                  - !GetAtt DBPasswordSecret.Arn
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role
      InstanceProfileName: !Sub 'webserver-ec2-profile-${AWS::StackName}'

  # RDS PostgreSQL Database Subnet Group
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS PostgreSQL
      SubnetIds:
        - !Ref SubnetId
      Tags:
        - Key: Name
          Value: webserver-db-subnet-group

  # RDS PostgreSQL Database
  AppDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: '20'
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '15'
      DBName: abc_db
      MasterUsername: dbadmin
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBPasswordSecret}}}'
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      StorageType: gp2
      BackupRetentionPeriod: 7
      MultiAZ: false
      Tags:
        - Key: Name
          Value: webserver-db

  # EC2 instance - t3.micro (free tier eligible in eu-west-2)
  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref EC2SecurityGroup
          SubnetId: !Ref SubnetId
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              set -e
              yum update -y
              yum install -y docker
              systemctl enable docker
              systemctl start docker
              
              # Fetch secrets from Secrets Manager
              ADMIN_PASS=$(aws secretsmanager get-secret-value --secret-id ${AdminSecret} --region ${AWS::Region} --query SecretString --output text)
              DB_PASS=$(aws secretsmanager get-secret-value --secret-id ${DBSecret} --region ${AWS::Region} --query SecretString --output text)
              
              aws ecr get-login-password --region ${AWS::Region} | docker login --username AWS --password-stdin ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com
              docker pull ${ImageUri}
              
              docker run -d --name app -p ${Port}:${Port} \
                -e DJANGO_SETTINGS_MODULE=webserver_project.settings \
                -e DB_ENGINE=django.db.backends.postgresql \
                -e DB_NAME=abc_db \
                -e DB_USER=dbadmin \
                -e DB_PASSWORD="${!DB_PASS}" \
                -e DB_HOST=${DBHost} \
                -e DB_PORT=5432 \
                -e DJANGO_SUPERUSER_PASSWORD="${!ADMIN_PASS}" \
                --restart unless-stopped ${ImageUri}
            - ImageUri: !Ref ContainerImageUri
              Port: !Ref ContainerPort
              AdminSecret: !Ref AdminPasswordSecret
              DBSecret: !Ref DBPasswordSecret
              DBHost: !GetAtt AppDatabase.Endpoint.Address
      Tags:
        - Key: Name
          Value: webserver-ec2

  # Associate Elastic IP to EC2 instance
  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref WebServerInstance
      AllocationId: !GetAtt AppElasticIP.AllocationId

Outputs:
  ElasticIP:
    Description: Static IP address (backup access)
    Value: !Ref AppElasticIP
    Export:
      Name: !Sub '${AWS::StackName}-ElasticIP'

  DirectAppURL:
    Description: Direct access via Elastic IP
    Value: !Sub 'http://${AppElasticIP}:${ContainerPort}'

  DatabaseEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt AppDatabase.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-DatabaseEndpoint'

  DatabasePort:
    Description: RDS PostgreSQL port
    Value: 5432
    Export:
      Name: !Sub '${AWS::StackName}-DatabasePort'

  DatabaseName:
    Description: Database name
    Value: abc_db

  EC2InstanceId:
    Description: EC2 instance ID
    Value: !Ref WebServerInstance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
